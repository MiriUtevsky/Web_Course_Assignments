<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Jungle - Miri</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="jungle">
        <button id="music-toggle" type="button">
            Mute
        </button>
        <h1>Welcome to the Jungle</h1>
        <p>Click an animal or press its key to hear its sound</p>
        <div class="animal animal-monkey" data-animal="monkey" data-key="m">

            <img src="images/animals/static/monkey.png" data-static="images/animals/static/monkey.png"
                data-gif="images/animals/gifs/monkey.gif" alt="Monkey">

            <span>Monkey · M</span>
        </div>


        <div class="animal animal-lion" data-animal="lion" data-key="l">

            <img src="images/animals/static/lion.png" data-static="images/animals/static/lion.png"
                data-gif="images/animals/gifs/lion.gif" alt="Lion">

            <span>Lion · L</span>
        </div>


        <div class="animal animal-bird" data-animal="bird" data-key="b">

            <img src="images/animals/static/bird.png" data-static="images/animals/static/bird.png"
                data-gif="images/animals/gifs/bird.gif" alt="Bird">

            <span>Bird · B</span>
        </div>


        <div class="animal animal-owl" data-animal="owl" data-key="o">

            <img src="images/animals/static/owl.png" data-static="images/animals/static/owl.png"
                data-gif="images/animals/gifs/owl.gif" alt="Owl">

            <span>Owl · O</span>
        </div>


        <div class="animal animal-wolf" data-animal="wolf" data-key="w">

            <img src="images/animals/static/wolf.png" data-static="images/animals/static/wolf.png"
                data-gif="images/animals/gifs/wolf.gif" alt="Wolf">

            <span>Wolf · W</span>
        </div>


        <div class="animal animal-crocodile" data-animal="crocodile" data-key="c">

            <img src="images/animals/static/crocodile.png" data-static="images/animals/static/crocodile.png"
                data-gif="images/animals/gifs/crocodile.gif" alt="Crocodile">

            <span>Crocodile · C</span>
        </div>


        <div class="animal animal-frog" data-animal="frog" data-key="f">

            <img src="images/animals/static/frog.png" data-static="images/animals/static/frog.png"
                data-gif="images/animals/gifs/frog.gif" alt="Frog">

            <span>Frog · F</span>
        </div>


        <div class="animal animal-snake" data-animal="snake" data-key="s">

            <img src="images/animals/static/snake.png" data-static="images/animals/static/snake.png"
                data-gif="images/animals/gifs/snake.gif" alt="Snake">

            <span>Snake · S</span>
        </div>
    </main>
    <audio id="background-music" loop>
        <source src="sounds/background/jungle.mp3" type="audio/mpeg">
    </audio>
    <script src="script.js"></script>
</body>


</html>
